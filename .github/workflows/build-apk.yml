name: build-apk

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OPENWRT_VERSION: "25.12.2"
      TARGET: "mediatek/filogic"
    steps:
      - uses: actions/checkout@v4

      - name: Install SDK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip \
            zlib1g-dev file wget curl jq zstd

      - name: Download OpenWrt SDK
        run: |
          set -eu
          base="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET}/"
          sdk_file="$(curl -fsSL "$base" | grep -o 'href="[^"]*openwrt-sdk[^"]*\.tar\.zst"' | head -n1 | cut -d'"' -f2)"
          test -n "$sdk_file"
          mkdir -p sdk
          curl -fL "${base}${sdk_file}" -o sdk.tar.zst
          tar -I zstd -xf sdk.tar.zst --strip-components=1 -C sdk

      - name: Build packages
        run: |
          set -eu
          mkdir -p sdk/package/openwrt-singbox-failover
          cp -a singbox-failover luci-app-singbox-failover sdk/package/openwrt-singbox-failover/
          cd sdk
          make defconfig
          make package/singbox-failover/compile V=s
          make package/luci-app-singbox-failover/compile V=s
          mkdir -p ../artifacts
          find bin/packages -name '*singbox-failover*.apk' -exec cp {} ../artifacts/ \;
          ls -la ../artifacts

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-singbox-failover-apk
          path: artifacts/*.apk
